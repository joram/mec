services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile.db
    # No named volume — the seeded cluster lives inside the image layer.
    # Every fresh container starts with the full 879-item catalogue instantly.
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mec"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://mec:mec@db:5432/mec
      SECRET_KEY: change-me-in-production-please
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
      network: host
    working_dir: /app
    volumes:
      # Mount only the files Vite watches for HMR — node_modules stays in the
      # image layer and is never shadowed by a host bind-mount.
      - ./app/src:/app/src
      - ./app/public:/app/public
      - ./app/index.html:/app/index.html
      - ./app/vite.config.ts:/app/vite.config.ts
    command: npm run dev
    ports:
      - "3001:3000"
    environment:
      API_PROXY_TARGET: http://api:8000
    depends_on:
      - api

