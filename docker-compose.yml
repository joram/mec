services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mec
      POSTGRES_USER: mec
      POSTGRES_PASSWORD: mec
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mec"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://mec:mec@db:5432/mec
      SECRET_KEY: change-me-in-production-please
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app

  seed:
    build:
      context: ./api
      dockerfile: Dockerfile.seed
    environment:
      DATABASE_URL: postgresql://mec:mec@db:5432/mec
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    profiles:
      - seed

  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./app:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3000"
    environment:
      VITE_API_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
